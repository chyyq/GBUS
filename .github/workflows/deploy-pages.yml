name: Daily Quant Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "35 22 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily quant data
        run: python scripts/generate-data.py
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Build Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/data
          cp docs/index.html _site/index.html
          cp docs/404.html _site/404.html
          cp docs/styles.css _site/styles.css
          cp docs/app.js _site/app.js
          cp docs/data/latest.json _site/data/latest.json
          touch _site/.nojekyll
          test -s _site/index.html
          test -s _site/app.js
          test -s _site/styles.css
          test -s _site/data/latest.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
